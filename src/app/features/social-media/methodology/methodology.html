<div class="methodology-page">
  <mat-card class="methodology-card">
    <mat-card-header>
      <mat-card-title>Scope and method</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div *ngIf="loading()" class="loading-container">
        <app-ollama-loader
          [title]="'Ollama AI is drafting methodology notes'"
          [subtitle]="'Compiling scope, cohort logic, and analysis method for the selected data window'">
        </app-ollama-loader>
      </div>
      <ul *ngIf="!loading()" class="list">
        <li *ngFor="let line of bullets()">{{ line }}</li>
      </ul>
    </mat-card-content>
  </mat-card>
</div>
