<div class="methodology-page">
  <mat-card class="methodology-card">
    <mat-card-header>
      <mat-card-title>Scope and method</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p *ngIf="loading()" class="muted">Loading scope and method...</p>
      <ul class="list">
        <li *ngFor="let line of bullets()">{{ line }}</li>
      </ul>
    </mat-card-content>
  </mat-card>
</div>
