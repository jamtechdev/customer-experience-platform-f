<div class="methodology-page">
  <mat-card class="methodology-card">
    <mat-card-header>
      <mat-card-title>{{ t('nav.methodology') }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div *ngIf="loading()" class="loading-container">
        <app-ollama-loader
          [title]="t('socialMediaPage.methodologyLoadingTitle')"
          [subtitle]="t('socialMediaPage.methodologyLoadingSubtitle')">
        </app-ollama-loader>
      </div>
      <ul *ngIf="!loading()" class="list">
        <li *ngFor="let line of bullets()">{{ line }}</li>
      </ul>
    </mat-card-content>
  </mat-card>
</div>
