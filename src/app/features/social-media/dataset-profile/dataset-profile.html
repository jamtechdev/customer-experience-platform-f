<div class="dataset-profile-container">
  <mat-card class="section-card">
    <mat-card-header>
      <mat-card-title>{{ t('nav.datasetProfile') }}</mat-card-title>
      <mat-card-subtitle>All counts come from your latest CSV import and AI report cohort — use CSV Imports as the single data entry point.</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <div *ngIf="loading()" class="loading-container">
        <app-ollama-loader
          [title]="t('socialMediaPage.datasetLoadingTitle')"
          [subtitle]="t('socialMediaPage.datasetLoadingSubtitle')">
        </app-ollama-loader>
      </div>
      <div *ngIf="!loading()">
        <div class="metric-grid" *ngIf="rows().length; else emptyState">
          <article class="metric-card" *ngFor="let row of rows()" [class.metric-card--span]="!isCountRow(row)">
            <span class="metric-label">{{ row.metric }}</span>
            <button
              *ngIf="isCountRow(row); else plainMetric"
              class="metric-value metric-value--link"
              type="button"
              (click)="openProfileDrilldown(row)">
              {{ row.value }}
            </button>
            <ng-template #plainMetric>
              <span class="metric-value">{{ row.value }}</span>
            </ng-template>
            <p class="metric-comment">{{ row.comment }}</p>
          </article>
        </div>
        <ng-template #emptyState>
          <p class="empty-hint">No dataset profile yet. Upload a CSV under Imports, then use <strong>Refresh</strong> on the import history page.</p>
        </ng-template>
      </div>
    </mat-card-content>
  </mat-card>

  <app-related-feedback-modal
    [open]="drilldownOpen()"
    [loading]="drilldownLoading()"
    [title]="drilldownTitle()"
    [rows]="drilldownRows()"
    [page]="drilldownPage()"
    [pageSize]="drilldownPageSize"
    [total]="drilldownTotal()"
    (pageChange)="loadDrilldownPage($event)"
    (closed)="closeDrilldown()">
  </app-related-feedback-modal>
</div>
