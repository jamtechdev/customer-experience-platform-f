<div class="dataset-profile-container">
  <mat-card class="section-card">
    <mat-card-header>
      <mat-card-title>Dataset profile</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div *ngIf="loading()" class="loading-container">
        <app-ollama-loader
          [title]="'Ollama AI is building dataset profile'"
          [subtitle]="'Preparing profile metrics and cohort context for your selected period'">
        </app-ollama-loader>
      </div>
      <div *ngIf="!loading()" class="table-wrap">
        <table mat-table [dataSource]="rows()" class="report-table">
          <ng-container matColumnDef="metric">
            <th mat-header-cell *matHeaderCellDef>Metric</th>
            <td mat-cell *matCellDef="let row">{{ row.metric }}</td>
          </ng-container>
          <ng-container matColumnDef="value">
            <th mat-header-cell *matHeaderCellDef>Value</th>
            <td mat-cell *matCellDef="let row"><strong>{{ row.value }}</strong></td>
          </ng-container>
          <ng-container matColumnDef="comment">
            <th mat-header-cell *matHeaderCellDef>Comment</th>
            <td mat-cell *matCellDef="let row">{{ row.comment }}</td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>
</div>
