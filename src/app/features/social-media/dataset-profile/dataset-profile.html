<div class="dataset-profile-container">
  <mat-card class="section-card">
    <mat-card-header>
      <mat-card-title>{{ t('nav.datasetProfile') }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div *ngIf="loading()" class="loading-container">
        <app-ollama-loader
          [title]="t('socialMediaPage.datasetLoadingTitle')"
          [subtitle]="t('socialMediaPage.datasetLoadingSubtitle')">
        </app-ollama-loader>
      </div>
      <div *ngIf="!loading()" class="table-wrap">
        <table mat-table [dataSource]="rows()" class="report-table">
          <ng-container matColumnDef="metric">
            <th mat-header-cell *matHeaderCellDef>{{ t('socialMediaPage.metric') }}</th>
            <td mat-cell *matCellDef="let row">{{ row.metric }}</td>
          </ng-container>
          <ng-container matColumnDef="value">
            <th mat-header-cell *matHeaderCellDef>{{ t('socialMediaPage.value') }}</th>
            <td mat-cell *matCellDef="let row">
              <button
                *ngIf="isCountRow(row); else plainValue"
                mat-button
                color="primary"
                type="button"
                (click)="openProfileDrilldown(row)">
                <strong>{{ row.value }}</strong>
              </button>
              <ng-template #plainValue><strong>{{ row.value }}</strong></ng-template>
            </td>
          </ng-container>
          <ng-container matColumnDef="comment">
            <th mat-header-cell *matHeaderCellDef>{{ t('socialMediaPage.comment') }}</th>
            <td mat-cell *matCellDef="let row">{{ row.comment }}</td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>

  <app-related-feedback-modal
    [open]="drilldownOpen()"
    [loading]="drilldownLoading()"
    [title]="drilldownTitle()"
    [rows]="drilldownRows()"
    [page]="drilldownPage()"
    [pageSize]="drilldownPageSize"
    [total]="drilldownTotal()"
    (pageChange)="loadDrilldownPage($event)"
    (closed)="closeDrilldown()">
  </app-related-feedback-modal>
</div>
