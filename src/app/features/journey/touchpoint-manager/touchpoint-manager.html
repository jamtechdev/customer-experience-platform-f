<div class="touchpoint-container">
  <app-page-header-card
    title="Touchpoints"
    subtitle="Modern view of touchpoint volumes and key observations"
    icon="touch_app">
  </app-page-header-card>

  @if (loading()) {
    <div class="loading-container">
      <app-ollama-loader
        title="Loading customer touchpoints"
        subtitle="Reading AI-calculated business touchpoints and key observations from the CX report">
      </app-ollama-loader>
    </div>
  } @else {
    <div class="content-section">
      <mat-card class="section-card">
        <mat-card-header>
          <mat-card-title>Touchpoint volume and observations</mat-card-title>
        <mat-card-subtitle>AI-calculated business touchpoint volume in original customer-originated CX tweets.</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
          <figure class="mpl-figure" aria-label="Touchpoint volume chart">
            <figcaption class="mpl-figure-title">AI-Calculated Touchpoint Volumes in Original Customer CX Tweets.</figcaption>
            <div class="mpl-chart mpl-chart-mplframe mpl-bar-touch">
              <div class="mpl-axes-frame">
                <div class="mpl-y-label-outer" aria-hidden="true">Count</div>
                <div class="mpl-y-axis mpl-y-axis-mpl">
                  <span>{{ touchpointMaxEffective() }}</span>
                  <span>{{ (touchpointMaxEffective() * 3) / 4 | number : '1.0-0' }}</span>
                  <span>{{ touchpointMaxEffective() / 2 | number : '1.0-0' }}</span>
                  <span>{{ touchpointMaxEffective() / 4 | number : '1.0-0' }}</span>
                  <span>0</span>
                </div>
                <div class="mpl-plot mpl-plot-mpl mpl-plot-touch">
                  @for (row of reportTouchpoints(); track row.name) {
                    <div class="mpl-bar-col mpl-bar-col-touch">
                      <div class="mpl-bar-track">
                        <div class="mpl-bar-fill mpl-bar-mpl" [style.height.%]="touchpointBarFillPct(row.volume)"></div>
                      </div>
                      <div class="mpl-bar-value">{{ row.volume }}</div>
                      <div class="mpl-bar-cat mpl-bar-cat-rot mpl-bar-cat-mpl">{{ truncateChartLabel(row.name, 24) }}</div>
                    </div>
                  }
                </div>
              </div>
            </div>
          </figure>
          <div class="table-container">
            <table mat-table [dataSource]="reportTouchpoints()" class="touchpoint-table report-mat-table">
              <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef>Touchpoint</th>
                <td mat-cell *matCellDef="let row">{{ row.name }}</td>
              </ng-container>
              <ng-container matColumnDef="volume">
                <th mat-header-cell *matHeaderCellDef>Volume</th>
                <td mat-cell *matCellDef="let row">
                  <button mat-button color="primary" type="button" (click)="openRelatedTouchpoint(row)" [disabled]="!row.feedbackIds?.length">
                    {{ row.volume }}
                  </button>
                </td>
              </ng-container>
              <ng-container matColumnDef="observation">
                <th mat-header-cell *matHeaderCellDef>Key observation</th>
                <td mat-cell *matCellDef="let row">{{ row.observation }}</td>
              </ng-container>
              <tr mat-header-row *matHeaderRowDef="['name','volume','observation']"></tr>
              <tr mat-row *matRowDef="let row; columns: ['name','volume','observation']"></tr>
            </table>
          </div>
        </mat-card-content>
      </mat-card>
    </div>
  }

  <app-related-feedback-modal
    [open]="drilldownOpen()"
    [loading]="drilldownLoading()"
    [title]="drilldownTitle()"
    [rows]="drilldownRows()"
    [page]="drilldownPage()"
    [pageSize]="drilldownPageSize"
    [total]="drilldownTotal()"
    (pageChange)="loadDrilldownPage($event)"
    (closed)="closeDrilldown()">
  </app-related-feedback-modal>
</div>
