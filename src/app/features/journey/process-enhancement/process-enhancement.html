<div class="process-enhancement-container">
  <div *ngIf="loading()" class="loading-container">
    <app-ollama-loader
      [title]="'Ollama AI is generating process enhancement insights'"
      [subtitle]="'Synthesizing management takeaways and process-level improvement opportunities'">
    </app-ollama-loader>
  </div>

  <div *ngIf="!loading()">
  <mat-card class="section-card">
    <mat-card-header>
      <mat-card-title>Process improvements</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p *ngIf="loading()" class="muted">Loading process insights...</p>
      <ul class="list">
        <li *ngFor="let line of processImprovements()">{{ line }}</li>
      </ul>
    </mat-card-content>
  </mat-card>

  <mat-card class="section-card">
    <mat-card-header>
      <mat-card-title>What management should take away</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <ul class="list">
        <li *ngFor="let line of managementTakeaways()">{{ line }}</li>
      </ul>
    </mat-card-content>
  </mat-card>
  </div>
</div>
