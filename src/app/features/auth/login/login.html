<div class="login-container">
  <div class="auth-bg-wrapper">
    <div class="auth-bg-content">
      <p>{{ t('auth.marketingBlurb') }}</p>
      <img src="https://media.whatagraph.com/Create_a_social_media_dashboard_in_minutes_747fdbe763_92a8998190.webp" />
    </div>
  </div>
  <div class="login-card">
    <!-- Logo & Header -->
    <div class="login-header">
      <div class="back-button">
        <a routerLink=""> <svg width="40" height="40"
      viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M19 12H5M12 19l-7-7 7-7"/>
  </svg> {{ t('auth.backToHome') }}</a>
      </div>
      <h1>{{ t('auth.loginTitle') }}</h1>
      <p>{{ t('auth.loginSubtitle') }}</p>
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="onLogin()" class="login-form">
      @if (errorMessage()) {
        <div class="alert alert-error">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>{{ errorMessage() }}</span>
        </div>
      }

      <div class="form-group">
        <label for="email">{{ t('auth.email') }}</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input
            type="email"
            id="email"
            [(ngModel)]="email"
            name="email"
            [placeholder]="t('auth.emailPlaceholder')"
            required
            autocomplete="email"
            [disabled]="loaderService.isLoading()"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">{{ t('auth.password') }}</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            [type]="showPassword() ? 'text' : 'password'"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
            [disabled]="loaderService.isLoading()"
          />
          <button 
            type="button" 
            class="toggle-password"
            (click)="showPassword.set(!showPassword())"
            [disabled]="loaderService.isLoading()"
          >
            @if (showPassword()) {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            } @else {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" [disabled]="loaderService.isLoading()" />
          <span class="checkbox-custom"></span>
          <span>{{ t('auth.rememberMe') }}</span>
        </label>
        <a routerLink="/forgot-password" class="forgot-link">{{ t('auth.forgotPassword') }}</a>
      </div>

      <button type="submit" class="btn-login" [disabled]="loaderService.isLoading()">
        @if (loaderService.isLoading()) {
          <span class="spinner"></span>
          <span>{{ t('app.loading') }}</span>
        } @else {
          <span>{{ t('auth.login') }}</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        }
      </button>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      <p class="footer-text">{{ t('auth.dontHaveAccount') }} <a routerLink="/signup" class="link">{{ t('auth.signup') }}</a></p>
    </div>
  </div>
</div>
