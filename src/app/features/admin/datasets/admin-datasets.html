<div class="datasets-container">
  <div class="header-section">
    <h1>Dataset Management</h1>
    <p class="subtitle">View and manage uploaded CSV datasets</p>
  </div>

  <mat-card>
    <mat-card-content>
      <div *ngIf="loading()" class="loading-container">
        <mat-spinner diameter="40"></mat-spinner>
        <p>Loading datasets...</p>
      </div>

      <div *ngIf="!loading() && imports().length === 0" class="empty-state">
        <mat-icon>folder_open</mat-icon>
        <p>No CSV imports yet. Upload datasets from Data Sources.</p>
      </div>

      <table *ngIf="!loading() && imports().length > 0" mat-table [dataSource]="imports()" class="datasets-table">
        <ng-container matColumnDef="filename">
          <th mat-header-cell *matHeaderCellDef>Filename</th>
          <td mat-cell *matCellDef="let row">{{ row.originalFilename || row.filename }}</td>
        </ng-container>
        <ng-container matColumnDef="rowCount">
          <th mat-header-cell *matHeaderCellDef>Rows</th>
          <td mat-cell *matCellDef="let row">{{ row.rowCount ?? 'N/A' }}</td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let row">
            <mat-chip [color]="getStatusColor(row.status)">{{ row.status }}</mat-chip>
          </td>
        </ng-container>
        <ng-container matColumnDef="createdAt">
          <th mat-header-cell *matHeaderCellDef>Uploaded</th>
          <td mat-cell *matCellDef="let row">{{ formatDate(row.createdAt) }}</td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
