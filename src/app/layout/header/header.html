<mat-toolbar color="primary" class="header-toolbar">
  <button mat-icon-button (click)="onToggleSidenav()" class="menu-button">
    <mat-icon>menu</mat-icon>
  </button>

  <span class="toolbar-title">{{ t('app.title') }}</span>

  <span class="spacer"></span>

  <button
    mat-icon-button
    [matMenuTriggerFor]="notificationsMenu"
    class="icon-button"
    [attr.aria-label]="t('header.notificationsAria')">
    <mat-icon>notifications</mat-icon>
    <span class="alert-dot" [class.red]="alertIndicator() === 'red'" [class.green]="alertIndicator() === 'green'"></span>
  </button>

  <mat-menu #notificationsMenu="matMenu">
    <div class="notification-menu">
      <div class="notification-header">{{ t('header.notifications') }}</div>
      <div class="notification-empty">{{ t('header.noNotifications') }}</div>
    </div>
  </mat-menu>

  <app-language-switcher></app-language-switcher>

  <div class="user-and-role">
    <span class="role-badge" *ngIf="roleLabel">{{ roleLabel }}</span>
    <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-menu-button">
      <div class="user-avatar">{{ userInitials }}</div>
    </button>
  </div>

  <mat-menu #userMenu="matMenu">
    <div class="user-menu-header">
      <div class="user-info">
        <div class="user-name">{{ userName }}</div>
        <div class="user-email">{{ currentUser?.email }}</div>
        <div class="user-role" *ngIf="roleLabel">{{ roleLabel }}</div>
      </div>
    </div>
    <div class="menu-divider"></div>
    <button mat-menu-item (click)="onProfile()">
      <mat-icon>person</mat-icon>
      <span>{{ t('nav.profile') }}</span>
    </button>
    <button mat-menu-item (click)="onLogout()">
      <mat-icon>logout</mat-icon>
      <span>{{ t('nav.logout') }}</span>
    </button>
  </mat-menu>
</mat-toolbar>
