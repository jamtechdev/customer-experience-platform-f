<mat-toolbar color="primary" class="header-toolbar">
  <button mat-icon-button (click)="onToggleSidenav()" class="menu-button">
    <mat-icon>menu</mat-icon>
  </button>

  <span class="toolbar-title">{{ t('app.title') }}</span>
  <span class="ollama-status-badge" [class.connected]="ollamaConnected()" [class.disconnected]="!ollamaConnected()">
    <span class="status-dot"></span>
    {{ ollamaConnected() ? t('header.ollamaConnected') : t('header.ollamaDisconnected') }}
  </span>

  <span class="spacer"></span>

  <button
    mat-icon-button
    [matMenuTriggerFor]="notificationsMenu"
    (menuOpened)="onNotificationsMenuOpened()"
    class="icon-button"
    [attr.aria-label]="t('header.notificationsAria')">
    <mat-icon>notifications</mat-icon>
    <span class="alert-dot" [class.red]="alertIndicator() === 'red'" [class.green]="alertIndicator() === 'green'"></span>
    <span class="alert-count" *ngIf="alertCount() > 0">{{ alertCount() > 99 ? '99+' : alertCount() }}</span>
  </button>

  <mat-menu #notificationsMenu="matMenu">
    <div class="notification-menu">
      <div class="notification-header">{{ t('header.notifications') }}</div>
      <div *ngIf="alerts().length === 0" class="notification-empty">{{ t('header.noNotifications') }}</div>
      <div *ngIf="alerts().length > 0" class="notification-list">
        <button
          mat-menu-item
          type="button"
          class="notification-item"
          *ngFor="let alert of alerts()"
          (click)="onNotifications()">
          <span class="notification-priority" [ngClass]="alert.priority"></span>
          <span class="notification-copy">
            <span class="notification-title">{{ alert.title }}</span>
            <span class="notification-message">{{ alert.message }}</span>
            <span class="notification-date">{{ alert.createdAt | date:'short' }}</span>
          </span>
        </button>
      </div>
    </div>
  </mat-menu>

  <app-language-switcher></app-language-switcher>

  <div class="user-and-role">
    <span class="role-badge" *ngIf="roleLabel">{{ roleLabel }}</span>
    <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-menu-button">
      <div class="user-avatar">{{ userInitials }}</div>
    </button>
  </div>

  <mat-menu #userMenu="matMenu">
    <div class="user-menu-header">
      <div class="user-info">
        <div class="user-name">{{ userName }}</div>
        <div class="user-email">{{ currentUser?.email }}</div>
        <div class="user-role" *ngIf="roleLabel">{{ roleLabel }}</div>
      </div>
    </div>
    <div class="menu-divider"></div>
    <button mat-menu-item (click)="onProfile()">
      <mat-icon>person</mat-icon>
      <span>{{ t('nav.profile') }}</span>
    </button>
    <button mat-menu-item (click)="onLogout()">
      <mat-icon>logout</mat-icon>
      <span>{{ t('nav.logout') }}</span>
    </button>
  </mat-menu>
</mat-toolbar>
