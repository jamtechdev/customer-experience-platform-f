<mat-sidenav-container class="sidenav-container" [dir]="isRTL() ? 'rtl' : 'ltr'">
  <mat-sidenav
    #sidenav
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="sidenavOpened()"
    [position]="'start'"
    class="sidenav"
    [fixedInViewport]="isMobile()"
    [fixedTopGap]="isMobile() ? 0 : 64">
    <app-sidebar (navigate)="closeSidenav()"></app-sidebar>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <app-header (toggleSidenav)="toggleSidenav()"></app-header>
    <main class="content-wrapper">
      @if (showImportAnalysisOverlay()) {
        <div class="import-analysis-overlay" role="status" aria-live="polite" aria-busy="true">
          <app-ollama-loader
            [title]="t('importAnalysis.loaderTitle')"
            [subtitle]="t('importAnalysis.loaderSubtitle')">
          </app-ollama-loader>
        </div>
      }
      <router-outlet></router-outlet>
    </main>

    <app-footer></app-footer>
  </mat-sidenav-content>
</mat-sidenav-container>
